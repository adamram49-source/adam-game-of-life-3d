<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק החיים האינסופי שלי</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
        /* עיצוב נקי, נוח ומסודר למסך המלא */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111116;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* מסך הפתיחה */
        #welcome-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #1a1a2e 0%, #0f0f1a 100%);
            z-index: 10;
            transition: opacity 0.8s ease-out, visibility 0.8s;
        }

        /* כותרת האתר */
        .game-title {
            color: #deff9a;
            font-size: 3.5rem;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(222, 255, 154, 0.3);
            text-align: center;
            font-weight: 700;
        }

        /* כפתור התחל משחק מעוצב */
        .start-btn {
            padding: 25px 60px;
            font-size: 2rem;
            font-weight: bold;
            color: #0f0f1a;
            background-color: #deff9a;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(222, 255, 154, 0.4);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
        }

        .start-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(222, 255, 154, 0.6);
        }

        /* מיכל המשחק - מתרחב חלק בלחיצה */
        #unity-container {
            width: 10px;
            height: 10px;
            opacity: 0;
            transform: scale(0.1);
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1), width 1.2s ease, height 1.2s ease, opacity 0.5s ease;
            position: relative;
        }

        /* הגדלה אוטומטית למסך מלא לאחר לחיצה */
        #unity-container.fullscreen-active {
            width: 100vw;
            height: 100vh;
            opacity: 1;
            transform: scale(1);
        }

        #unity-canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
            background: #000;
        }

        /* התאמת מד הטעינה המקורי לעיצוב החדש */
        #unity-loading-bar {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            text-align: center;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="game-title">משחק החיים האינסופי</div>
        <button class="start-btn" onclick="launchGame()">התחל משחק</button>
    </div>

    <div id="unity-container">
        <canvas id="unity-canvas" tabindex="-1"></canvas>
        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
        <div id="unity-warning"></div>
    </div>

    <script>
        // פונקציית הבאנר המקורית של יוניטי למניעת שגיאות הגדרה
        function unityShowBanner(msg, type) {
            var warningBanner = document.querySelector("#unity-warning");
            if (!warningBanner) return;
            function updateBannerVisibility() {
                warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
            }
            var div = document.createElement('div');
            div.innerHTML = msg;
            warningBanner.appendChild(div);
            if (type == 'error') div.style = 'background: red; padding: 10px;';
            else {
                if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
                setTimeout(function() {
                    warningBanner.removeChild(div);
                    updateBannerVisibility();
                }, 5000);
            }
            updateBannerVisibility();
        }

        function launchGame() {
            const welcomeScreen = document.getElementById('welcome-screen');
            const unityContainer = document.getElementById('unity-container');
            var canvas = document.querySelector("#unity-canvas");

            // הפעלת האנימציה החלקה של פתיחת המסך
            welcomeScreen.style.opacity = '0';
            welcomeScreen.style.visibility = 'hidden';
            unityContainer.classList.add('fullscreen-active');

            // הצגת מד הטעינה המקורי של יוניטי
            document.querySelector("#unity-loading-bar").style.display = "block";

            // הגדרות הבסיס והנתיבים המדויקים מתוך הקובץ המקורי שלך
            var buildUrl = "Build";
            var loaderUrl = buildUrl + "/please.loader.js";
            
            var config = {
                arguments: [],
                dataUrl: buildUrl + "/please.data",
                frameworkUrl: buildUrl + "/please.framework.js",
                codeUrl: buildUrl + "/please.wasm",
                streamingAssetsUrl: "StreamingAssets",
                companyName: "DefaultCompany",
                productName: "MyGameOfLife",
                productVersion: "0.1.0",
                showBanner: unityShowBanner,
            };

            // טעינת מנוע המשחק
            var script = document.createElement("script");
            script.src = loaderUrl;
            script.onload = () => {
                createUnityInstance(canvas, config, (progress) => {
                    var progressBarFull = document.querySelector("#unity-progress-bar-full");
                    if (progressBarFull) {
                        progressBarFull.style.width = 100 * progress + "%";
                    }
                }).then((unityInstance) => {
                    document.querySelector("#unity-loading-bar").style.display = "none";
                    console.log("המשחק נטען ועלה בהצלחה!");
                }).catch((message) => {
                    alert("שגיאה בטעינת המשחק: " + message);
                });
            };

            document.body.appendChild(script);
        }
    </script>
</body>
</html>
